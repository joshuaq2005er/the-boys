<!DOCTYPE html>
<html>
<head>
<title>Pro Admin Panel</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#061a2e;
  color:white;
  display:flex;
}

/* SIDEBAR */
#sidebar {
  width:220px;
  height:100vh;
  background:#0b2b4d;
  padding-top:20px;
}

.tab {
  margin:10px;
  padding:12px;
  background:#123a6b;
  border-radius:10px;
  cursor:pointer;
  text-align:center;
  transition:0.2s;
}
.tab:hover { background:#1e5aa8; }

/* MAIN */
#main {
  margin-left:230px;
  padding:20px;
  width:100%;
}

/* LOGIN */
#login {
  margin:auto;
  margin-top:150px;
  text-align:center;
}

/* INPUTS */
input {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

/* BUTTON */
button {
  padding:10px 15px;
  background:#1e5aa8;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
button:hover { background:#2d7de0; }

/* CARD */
.card {
  background:rgba(255,255,255,0.05);
  padding:10px;
  margin:8px;
  border-radius:8px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Login</h2>
  <input id="pass" placeholder="Password">
  <br><br>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="sidebar" style="display:none;">
  <div class="tab" onclick="tab('kick')">Kick</div>
  <div class="tab" onclick="tab('ban')">Ban</div>
  <div class="tab" onclick="tab('warn')">Warn</div>
  <div class="tab" onclick="tab('history')">History</div>
</div>

<div id="main" style="display:none;">
  <h2>Dashboard</h2>
  <div id="content"></div>
</div>

<script>
const API = "http://87.106.155.7:12281";

let selected=null;

/* LOGIN FIXED */
function login(){
  fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({password:document.getElementById("pass").value})
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.status==="ok"){
      document.getElementById("login").style.display="none";
      document.getElementById("sidebar").style.display="block";
      document.getElementById("main").style.display="block";
    } else alert("Wrong password");
  });
}

/* TABS */
function tab(t){
  let html="";

  if(t!=="history"){
    html=`
      <input id="uid" placeholder="User ID"><br>
      <input id="reason" placeholder="Reason"><br><br>
      <button onclick="send('${t}')">Execute</button>
    `;
  } else {
    html=`
      <input id="uid" placeholder="User ID"><br><br>
      <button onclick="load()">Load History</button>
      <div id="out"></div>
    `;
  }

  document.getElementById("content").innerHTML=html;
}

/* ACTIONS */
function send(type){
  fetch(API+"/"+type,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      user_id:document.getElementById("uid").value,
      reason:document.getElementById("reason").value
    })
  }).then(r=>r.json()).then(alert);
}

/* HISTORY */
function load(){
  let id=document.getElementById("uid").value;

  fetch(API+"/history/"+id)
  .then(r=>r.json())
  .then(d=>{
    document.getElementById("out").innerHTML =
      d.map(x=>`<div class="card">${x[0]} - ${x[1]} (${x[2]})</div>`).join("");
  });
}
</script>

</body>
</html>
