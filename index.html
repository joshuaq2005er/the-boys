<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#061a2e;
  color:white;
  display:flex;
}

/* SIDEBAR */
#sidebar {
  width:220px;
  height:100vh;
  background:#0b2b4d;
  padding-top:20px;
}

.tab {
  margin:10px;
  padding:12px;
  background:#123a6b;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
  text-align:center;
}

.tab:hover {
  background:#1e5aa8;
}

/* MAIN */
#main {
  margin-left:230px;
  padding:20px;
  width:100%;
}

/* INPUTS */
input {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
}

/* BUTTON */
button {
  padding:10px 15px;
  background:#1e5aa8;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

button:hover {
  background:#2d7de0;
}

/* CARD */
.card {
  background:rgba(255,255,255,0.05);
  padding:10px;
  margin:8px;
  border-radius:8px;
}
</style>
</head>

<body>

<div id="sidebar">
  <div class="tab" onclick="tab('kick')">Kick</div>
  <div class="tab" onclick="tab('ban')">Ban</div>
  <div class="tab" onclick="tab('warn')">Warn</div>
  <div class="tab" onclick="tab('history')">History</div>
</div>

<div id="main">
  <h2>Admin Dashboard</h2>
  <div id="content"></div>
</div>

<script>
const API = "http://87.106.155.7:12281";

function tab(t){
  let html="";

  if(t!="history"){
    html=`
      <h3>${t.toUpperCase()}</h3>
      <input id="uid" placeholder="User ID"><br>
      <input id="reason" placeholder="Reason"><br><br>
      <button onclick="send('${t}')">Execute</button>
    `;
  } else {
    html=`
      <h3>History</h3>
      <input id="uid" placeholder="User ID"><br><br>
      <button onclick="load()">Load</button>
      <div id="out"></div>
    `;
  }

  document.getElementById("content").innerHTML=html;
}

function send(type){
  fetch(API+"/"+type,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      user_id:document.getElementById("uid").value,
      reason:document.getElementById("reason").value
    })
  }).then(r=>r.json()).then(alert);
}

function load(){
  let id=document.getElementById("uid").value;

  fetch(API+"/history/"+id)
  .then(r=>r.json())
  .then(d=>{
    document.getElementById("out").innerHTML =
      d.map(x=>`<div class="card">${x[0]} - ${x[1]} (${x[2]})</div>`).join("");
  });
}
</script>

</body>
</html>
