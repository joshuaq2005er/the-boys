<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #06162c, #0a2a4a);
  color: white;
  text-align: center;
}

/* fade in animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

h1 {
  margin-top: 30px;
  animation: fadeIn 0.6s ease;
}

/* login box */
#login {
  margin-top: 50px;
  animation: fadeIn 0.6s ease;
}

input {
  padding: 12px;
  margin: 6px;
  border-radius: 8px;
  border: none;
  outline: none;
  width: 200px;
}

/* buttons */
button {
  padding: 12px 18px;
  background: #1e5aa8;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #2d7de0;
  transform: scale(1.05);
}

/* tabs */
.tab {
  display: inline-block;
  padding: 12px 18px;
  margin: 10px;
  background: #123a6b;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.tab:hover {
  background: #1e5aa8;
  transform: translateY(-2px);
}

/* panel */
.panel {
  margin-top: 20px;
  animation: fadeIn 0.3s ease;
}

/* output box */
#out {
  margin-top: 10px;
  padding: 10px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
  max-width: 500px;
  margin-left: auto;
  margin-right: auto;
  text-align: left;
  animation: fadeIn 0.3s ease;
}
</style>

</head>

<body>

<h1>Admin Dashboard</h1>

<div id="login">
  <input id="pass" placeholder="Password">
  <br>
  <button onclick="login()">Login</button>
</div>

<div id="main" style="display:none;">

  <div class="tab" onclick="tab('kick')">Kick</div>
  <div class="tab" onclick="tab('ban')">Ban</div>
  <div class="tab" onclick="tab('warn')">Warn</div>
  <div class="tab" onclick="tab('history')">History</div>

  <div class="panel" id="panel"></div>

</div>

<script>
const API = "http://87.106.155.7:12281"; // FIXED (no trailing slash)

// LOGIN
function login() {
  fetch(API + "/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      password: document.getElementById("pass").value
    })
  })
  .then(r => r.json())
  .then(d => {
    if (d.status) {
      document.getElementById("login").style.display = "none";
      document.getElementById("main").style.display = "block";
    } else {
      alert("❌ Wrong password");
    }
  })
  .catch(() => alert("❌ Server error"));
}

// TABS
function tab(t) {
  let html = "";

  if (t !== "history") {
    html = `
      <input id="user" placeholder="User ID"><br>
      <input id="reason" placeholder="Reason"><br><br>
      <button onclick="send('${t}')">Execute ${t}</button>
    `;
  } else {
    html = `
      <input id="user" placeholder="User ID"><br><br>
      <button onclick="getHistory()">Get History</button>
      <div id="out"></div>
    `;
  }

  document.getElementById("panel").innerHTML = html;
}

// SEND ACTIONS
function send(type) {
  fetch(API + "/" + type, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      user_id: document.getElementById("user").value,
      reason: document.getElementById("reason").value
    })
  })
  .then(r => r.json())
  .then(d => {
    alert(JSON.stringify(d));
  })
  .catch(() => alert("❌ Failed request"));
}

// HISTORY
function getHistory() {
  let u = document.getElementById("user").value;

  fetch(API + "/history/" + u)
  .then(r => r.json())
  .then(d => {
    if (!Array.isArray(d)) {
      document.getElementById("out").innerHTML = "No data";
      return;
    }

    document.getElementById("out").innerHTML =
      d.map(x => `• [${x[2]}] ${x[0]} - ${x[1]}`).join("<br>");
  })
  .catch(() => {
    document.getElementById("out").innerHTML = "Error loading history";
  });
}
</script>

</body>
</html>
